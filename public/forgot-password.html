<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password - Jimms Part Picker</title>
    <script>
      (() => {
        try {
          const theme = window.localStorage.getItem("jimms-part-picker-theme");
          if (theme === "light" || theme === "dark") {
            document.documentElement.dataset.theme = theme;
          }
        } catch (error) {
          void error;
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css?v=20260426b">
  </head>
  <body data-auth-page="forgot">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Jimms Part Picker home">
        <span class="brand-mark">JP</span>
        <span>
          <strong>Jimms Part Picker</strong>
          <small>Finnish PC builds, Jimms.fi prices</small>
        </span>
      </a>
      <div class="topbar-actions">
        <a class="ghost-button" href="/">Back to Builder</a>
      </div>
    </header>

    <main class="auth-page-layout">
      <section class="auth-page-shell">
        <div class="auth-page-shell-head">
          <h1>Forgot Password</h1>
          <p>Send a reset email, then enter the code and your new password here.</p>
        </div>
        <div class="auth-page-status" id="authPageStatus" aria-live="polite"></div>
        <form class="auth-page-form" id="forgotForm">
          <label class="build-name-field">
            <span>Email</span>
            <input id="forgotEmailInput" type="email" autocomplete="username" placeholder="Email" required>
          </label>
          <label class="build-name-field">
            <span>Reset code</span>
            <input id="resetCodeInput" type="text" maxlength="16" placeholder="Reset code">
          </label>
          <label class="build-name-field">
            <span>New password</span>
            <input id="resetPasswordInput" type="password" autocomplete="new-password" placeholder="New password">
          </label>
          <label class="build-name-field">
            <span>Confirm new password</span>
            <input id="resetConfirmPasswordInput" type="password" autocomplete="new-password" placeholder="Confirm new password">
          </label>
          <div class="auth-page-actions auth-page-actions-stack">
            <button class="jimms-cart-button" id="requestResetButton" type="button">Send reset email</button>
            <button class="ghost-button" type="submit">Reset password</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/auth-pages.js?v=20260426b" defer></script>
  </body>
</html>
